name: ci

# Build + test on every push and PR (DOD 2.5).
on:
  push:
  pull_request:

jobs:
  # Python prototype tests (synthetic + unit; KITTI integration tests self-skip
  # without local data, so they are safe to run on a bare runner).
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r prototypes/python/requirements.txt
      - name: Pytest
        run: PYTHONPATH=prototypes/python python -m pytest prototypes/python/tests -q

  # C++ ROS2 packages: build and run the gtests inside the ROS2 Humble image.
  ros2:
    runs-on: ubuntu-latest
    container:
      image: ros:humble-ros-base
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake libeigen3-dev python3-colcon-common-extensions
          rm -rf /var/lib/apt/lists/*
      - name: colcon build
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_ws
          colcon build --packages-select kf_common kf_msgs kf_eskf
      - name: colcon test (gtest)
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_ws
          source install/setup.bash
          colcon test --packages-select kf_common kf_eskf --event-handlers console_direct+
          colcon test-result --all
